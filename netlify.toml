# netlify.toml — LCare IQ deployment config

[build]
  publish = "."

# Standard (Lambda) functions directory — still used for any non-AI function
[functions]
  directory = "netlify/functions"

# ── /api/claude is served by an Edge Function (no 10s timeout) ──
# The function file (netlify/edge-functions/claude.js) also declares
# its own path via `config.path`; this block makes it explicit.
[[edge_functions]]
  path = "/api/claude"
  function = "claude"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
